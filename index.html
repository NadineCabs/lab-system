<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCS | Computer Lab System</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── NAVBAR ── -->
  <nav>
    <div class="nav-inner">

      <a href="#" class="brand">
        <div class="brand-icon">
          <img src="ccslogo.png" alt="CCS Logo" />
        </div>
        <div class="brand-text">
          <span class="brand-title">CompLog</span>
        </div>
      </a>

      <ul class="nav-links">
        <li><a href="#" class="active">Home</a></li>
        <li class="dropdown">
          <a href="#">
            Community
            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </a>
        </li>
        <li><a href="#">About</a></li>
      </ul>

      <div class="nav-auth">
        <div class="nav-divider"></div>
        <a href="#" onclick="showLoginPanel()" class="btn-nav-login">Login</a>
        <a href="#" onclick="showRegisterPanel()" class="btn-nav-register">Register</a>
      </div>

      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="#">Home</a>
    <a href="#">Community</a>
    <a href="#">About</a>
    <div class="mobile-auth">
      <a href="#" onclick="showLoginPanel()" class="btn-nav-login">Login</a>
      <a href="#" onclick="showRegisterPanel()" class="btn-nav-register">Register</a>
    </div>
  </div>

  <!-- ── MAIN CONTENT ── -->
  <div class="single-container">
    <div class="centered-content">

      <div class="logo-content">
        <div class="ccs-logo-wrapper">
          <img src="ccslogo.png" alt="University of Cebu Logo" class="ccs-logo"/>
        </div>
        <h2 class="left-title">College of Computer Studies</h2>
        <p class="left-sub">Sit-in Monitoring System</p>
      </div>

      <!-- LOGIN CONTAINER -->
      <div class="form-container" id="loginContainer">

        <!-- LOGIN FORM -->
        <div class="form-box" id="loginBox">
          <h2 class="form-title">Sign In</h2>
          <p class="form-subtitle">
            Don't have an account?
            <a href="#" onclick="showRegister()" class="link-primary">Sign Up</a>
          </p>

          <div class="form-group floating-label">
            <input type="text" id="loginStudentID" placeholder=" " required>
            <label for="loginStudentID">Student ID</label>
          </div>

          <div class="form-group floating-label">
            <input type="password" id="loginPassword" placeholder=" " required>
            <label for="loginPassword">Password</label>
          </div>

          <button onclick="login()" class="btn-submit">Log In</button>
          <p class="message" id="loginMessage"></p>
        </div>

      </div>

      <!-- REGISTER CONTAINER -->
      <div class="form-container" id="registerContainer">

        <!-- REGISTER FORM -->
        <div class="form-box hidden" id="registerBox">
          <h2 class="form-title">Sign Up</h2>
          <p class="form-subtitle">
            Already have an account?
            <a href="#" onclick="showLogin()" class="link-primary">Sign In</a>
          </p>

          <div class="form-grid">
            <div class="form-group floating-label">
              <input type="text" id="regIDnumber" placeholder=" " required>
              <label for="regIDnumber">ID Number</label>
            </div>

            <div class="form-group floating-label">
              <input type="text" id="regLastName" placeholder=" " required>
              <label for="regLastName">Last Name</label>
            </div>
          </div>

          <div class="form-grid">
            <div class="form-group floating-label">
              <input type="text" id="regFirstName" placeholder=" " required>
              <label for="regFirstName">First Name</label>
            </div>

            <div class="form-group floating-label">
              <input type="text" id="regMiddleName" placeholder=" " required>
              <label for="regMiddleName">Middle Name</label>
            </div>
          </div>
         
            <div class="form-group floating-label">
              <input type="text" id="regCourse" placeholder=" " required>
              <label for="regCourse">Course</label>
            </div>

            <div class="form-group floating-label">
              <select id="regCourseLevel" class="form-select" required>
                <option value="">Select Year</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
              </select>
              <label for="regCourseLevel">Course Level</label>
            </div>
          </div>

          <div class="form-grid">
            <div class="form-group floating-label">
              <input type="password" id="regPassword" placeholder=" " required>
              <label for="regPassword">Password</label>
            </div>

            <div class="form-group floating-label">
              <input type="password" id="regRepeatPassword" placeholder=" " required>
              <label for="regRepeatPassword">Repeat Password</label>
            </div>
          </div>

           
            <div class="form-group floating-label">
              <input type="text" id="regEmail" placeholder=" " required>
              <label for="regEmail">Email</label>
            </div>

          <div class="form-group floating-label">
            <input type="text" id="regAddress" placeholder=" " required>
            <label for="regAddress">Address</label>
          </div>

          <button onclick="register()" class="btn-submit">Create account</button>
          <p class="message" id="regMessage"></p>
        </div>

      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
